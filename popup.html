<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      width: 420px;
      margin: 0;
      padding: 10px;
      color: #202124;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 14px;
      margin: 0;
    }
    .clear-btn {
      font-size: 11px;
      color: #1a73e8;
      background: none;
      border: 1px solid #1a73e8;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .clear-btn:hover {
      background: #e8f0fe;
    }
    .clear-btn:disabled {
      color: #9aa0a6;
      border-color: #dadce0;
      cursor: default;
    }
    .url-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .del-btn {
      flex: 0 0 auto;
      font-size: 12px;
      line-height: 1;
      color: #9aa0a6;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
    }
    .del-btn:hover {
      color: #d93025;
    }
    .empty {
      color: #5f6368;
      font-style: italic;
    }
    .group {
      margin-bottom: 14px;
    }
    .group-page {
      font-size: 12px;
      font-weight: 600;
      word-break: break-all;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e0e0e0;
    }
    .match {
      padding: 6px 0;
    }
    .match + .match {
      border-top: 1px dashed #eee;
    }
    .label {
      font-weight: 600;
      font-size: 10px;
      color: #5f6368;
      text-transform: uppercase;
      margin-bottom: 1px;
    }
    .pattern {
      color: #d93025;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 4px;
    }
    /* CloudFront URLs are very long: keep clickable but clamp to one line. */
    .cf-url {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      color: #1a73e8;
      text-decoration: none;
      margin-bottom: 2px;
    }
    .cf-url:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CloudFront Wildcard Matches</h1>
    <button id="clear" class="clear-btn">Clear all</button>
  </div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
